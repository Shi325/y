
<!DOCTYPE html>
<title>ワクワクちんぽ</title>
<img src="A.png" id="tapImg" style="cursor:pointer;">

<script>
  document.getElementById('tapImg').addEventListener('click', async () => {
    const ctx = new AudioContext();
    const res = await fetch('yaju-u.mp3');
    const buf = await res.arrayBuffer();
    const decoded = await ctx.decodeAudioData(buf);
    const source = ctx.createBufferSource();
    source.buffer = decoded;
    source.connect(ctx.destination);
    source.start();
  });
</script>
