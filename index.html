<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タップしてダウンロード</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #f0ede8;
      overflow: hidden;
    }

    /* 背景ノイズ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
    }

    .card {
      position: relative;
      cursor: pointer;
      width: 280px;
      height: 280px;
      border-radius: 4px;
      overflow: hidden;
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.96);
    }

    /* サンプル画像（SVGで生成） */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* タップオーバーレイ */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:active .overlay {
      background: rgba(255,255,255,0.08);
    }

    .tap-icon {
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.15s, transform 0.15s;
      font-size: 48px;
    }

    .card:active .tap-icon {
      opacity: 1;
      transform: scale(1);
    }

    .hint {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.1em;
    }

    /* トースト通知 */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e1e;
      border: 1px solid #333;
      color: #f0ede8;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 12px 24px;
      border-radius: 100px;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <span class="label">tap to download</span>

    <div class="card" id="tapCard">
      <!-- サンプル画像（実際はお好きな画像に差し替えてください） -->
      <img
        src="https://picsum.photos/seed/fukuoka/560/560"
        alt="サンプル画像"
      >
      <div class="overlay">
        <span class="tap-icon">↓</span>
      </div>
    </div>

    <span class="hint">画像をタップ → A.png を保存 &amp; 音楽再生</span>
  </div>

  <div id="toast">✓ ダウンロード開始・音楽再生中</div>

  <!--
    ▼ ファイルの配置について
    こ
</body>
</html>
